<!DOCTYPE html>
<html>
<head>
  <title>ESP32 Control</title>
</head>
<body>

<h1>Mi ESP32 🔥</h1>

<button onclick="encender()">Encender</button>
<button onclick="apagar()">Apagar</button>

<script>
function encender() {
  fetch("http://192.168.1.100/on");
}

function apagar() {
  fetch("http://192.168.1.100/off");
}
</script>

</body>
</html>
